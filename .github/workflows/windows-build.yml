name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    defaults:
      run:
        shell: msys2 {0}
        
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-rust
          mingw-w64-x86_64-libopenmpt
          mingw-w64-x86_64-ffmpeg
          mingw-w64-x86_64-clang
          
    - name: Build RustTracker
      env:
        BINDGEN_EXTRA_CLANG_ARGS: "-target x86_64-pc-windows-gnu"
      run: |
        cargo build --release
        
    - name: Package Release
      run: |
        mkdir release
        cp target/release/rusttracker.exe release/rusttracker.exe
        # Automatically resolve and copy all required MSYS2 DLLs (including FFmpeg transitive dependencies)
        ldd target/release/rusttracker.exe | grep -i '/mingw64' | awk '{print $3}' | xargs -I '{}' cp '{}' release/
        
    - name: Get Version
      run: |
        VERSION=$(grep -m 1 '^version' Cargo.toml | cut -d '"' -f 2)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        
    - name: Build Installer
      shell: cmd
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=%VERSION%" installer.iss
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: RustTracker-Windows
        path: setup/RustTracker-Setup.exe
