[package]
name = "rusttracker"
version = "0.1.0"
edition = "2024"
default-run = "rusttracker"

[dependencies]
anyhow = "1.0.101"
clap = { version = "4.5.57", features = ["derive"] }
cpal = "0.17.1"
crossbeam-channel = "0.5.15"
crossterm = "0.29.0"
openmpt = "0.3.1"
ratatui = "0.30.0"
spectrum-analyzer = "1.7.0"
symphonia = { version = "0.5.4", features = ["all"] }
wgpu = "24.0.0"
winit = "0.30.5"
bytemuck = { version = "1.21.0", features = ["derive"] }
pollster = "0.4.0"
egui = "0.31.0"
egui-wgpu = "0.31.0"
egui-winit = "0.31.0"
rfd = "0.17.2"
